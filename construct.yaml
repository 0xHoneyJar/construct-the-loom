# construct.yaml — the-loom
# Authored 2026-04-28 from composition-grok-surface team verdict (barth + ostrom + beauvoir + lexicographer + alexander)
# CURATOR apprenticeship stages 4 (streams) + 5 (composition) below.

schema_version: 3

name: "the-loom"
slug: the-loom
version: 0.1.0
description: "Spell-book × deck-builder for loa-compositions. Browse, compose, invoke. Persona: DEALER."
short_description: "Composition deck-builder"
author: 0xHoneyJar
license: MIT
type: skill-pack
visibility: public

domain:
  - design
  - operations

# Skills — one in v1 (the dispatch + ribbon machinery).
# Cycle 2 candidates: composing-decks (drag-stack), inspecting-recipes (yaml-flip), recalling-runs (history browse)
skills:
  - slug: playing-compositions
    path: skills/playing-compositions

# Slash commands
commands:
  - name: loom
    path: commands/loom.md

# Composition — bidirectional edges with the network.
compose_with:
  - slug: the-weaver
    relationship: "Sibling — weaver authors flows + emits compositions; loom is where the weaving is browsed and invoked. Pair: weaver weaves, loom is the loom."
  - slug: the-arcade
    relationship: "Lineage — BARTH discipline (deck-builder genre, arcade-quarter UX) + OSTROM structural (composition algebra, ECS isolation: substrate stays blind to UX)"
  - slug: construct-creator
    relationship: "Gap router — when a composition is invoked but a referenced construct is missing, surface to CURATOR via gap-signal"
  - slug: observer
    relationship: "When a composition fails mid-chain, KEEPER consumes the trajectory as listening signal"

# Grimoire interface — the loom reads the registry, writes run state.
composition_paths:
  reads:
    - grimoires/{product}/loa-compositions/compositions/   # the registry (private moat per IP boundary)
    - grimoires/{product}/.run/compose/                    # prior run trajectories for recall
  writes:
    - .run/compose/{run_id}/orchestrator.jsonl             # this-run trajectory (read by ribbon)
    # Operator-private state lives at ~/.config/loom/state.json (recents + pinned)

# Stream signature
streams:
  reads:
    - Intent          # operator types `loom <name>` — the play
    - Artifact        # composition.yaml files (the recipes)
  writes:
    - Verdict         # run pass/fail at chain completion
    - Signal          # stage-by-stage transitions (the live ribbon source)
    - Artifact        # orchestrator.jsonl trajectory written for downstream consumers

repository:
  url: https://github.com/0xHoneyJar/construct-the-loom.git
  homepage: https://constructs.network/constructs/the-loom

events:
  emits:
    - type: the-loom.composition.played
      description: Emitted when a composition completes (success or failure)
    - type: the-loom.gap.surfaced
      description: Emitted when a composition references a construct not installed locally — routes to construct-creator
    - type: the-loom.recipe.pinned
      description: Operator pinned a composition to the home view
  consumes:
    - type: the-weaver.flow.authored
      description: Refresh the registry view when the-weaver writes a new composition.yaml
    - type: construct.registry.changed
      description: Re-scan compositions when constructs install/uninstall

identity:
  persona: identity/persona.yaml
  expertise: identity/expertise.yaml
  handles:
    - DEALER

quick_start:
  command: /loom
  description: "Open the spell-book — 5-card hand of recents + pinned. Type `loom <name>` to play."

# IP boundary (load-bearing — operator decision 2026-04-28)
# - The lens (this construct) is PUBLIC — anyone can install and bring their own compositions
# - The curated registry at ~/bonfire/loa-compositions/compositions/ is the PRIVATE MOAT
# - The substrate (composition.schema.json + compose-run.sh) is PUBLIC — lives in loa-constructs
