# construct.yaml — Construct pack manifest
# See: https://constructs.network/docs/schema for full reference
# Validate: yq eval '.' construct.yaml && ajv validate -s schemas/construct.schema.json

schema_version: 3

# CUSTOMIZE: Display name for registry and UI
name: "Code Review Assistant"

# CUSTOMIZE: URL-safe identifier (kebab-case, 2+ chars)
slug: code-review-assistant

# Semantic version — bump on each release
version: 1.0.0

# CUSTOMIZE: One-line description shown in registry search results
description: "Catches production issues by blast radius — the top 3-5 things that would hurt your users most"

# CUSTOMIZE: Storefront tagline (noun phrase, max 80 chars, no articles or superlatives)
short_description: "Production issue triage"

# CUSTOMIZE: Your name or organization
author: your-name

# SPDX license identifier
license: MIT

# Construct archetype — what kind of pack this is
type: skill-pack

# Network visibility — must be 'public' to appear on constructs.network
visibility: public

# Domain tags for discovery and categorization
# See category list: marketing, development, security, analytics, documentation, operations, design, infrastructure
domain:
  - development

# Skills provided by this construct
# Each skill maps to a directory under skills/
skills:
  # A minimal skill — fast code review pass
  - slug: quick-review
    path: skills/example-simple

  # A full skill — documentation generation with quality gates
  - slug: write-docs
    path: skills/example-full

# Slash commands registered in the runtime
# Each command maps to a markdown file under commands/
commands:
  - name: quick-review
    path: commands/example-command.md

# Composition — how this construct connects to others
# The grimoire path is the interface. Constructs that share paths are composed.
compose_with:
  - slug: observer
    relationship: "Consumes user truth for review grounding"

# Grimoire paths this construct reads from and writes to.
# SEED §12: the grimoire path IS the interface. Two constructs writing
# to the same path compose automatically; one writing + one reading
# forms an implicit pipe edge. Declare every real read + write here.
composition_paths:
  writes:
    - grimoires/code-review/findings/
  reads: []

# Typed streams this construct consumes and produces (doctrine §3).
# Five primitives: Signal · Verdict · Artifact · Intent · Operator-Model.
# Consumed at composition-build-time by construct-compose.sh to verify
# pipe compatibility before any stage runs. Empty arrays are legal but
# will be flagged as pipe-ambiguous by construct-validate.sh.
streams:
  reads:
    - Artifact        # the pull request / diff being reviewed
    - Operator-Model  # who the operator is — tunes depth + register
  writes:
    - Verdict         # the review verdict (severity-tagged findings)

# Repository metadata
repository:
  url: https://github.com/your-org/construct-code-review.git
  homepage: https://constructs.network/constructs/code-review-assistant

# Event bus integration
# emits: declare what your construct produces (encouraged from day one)
# consumes: declare what you need from other constructs (add when real)
events:
  emits:
    - type: forge.code-review.issues_found
      description: Emitted when review finds issues
  consumes: []

# Governance (for cross-cutting constructs like vocabulary, taste, design rules)
# Uncomment if your construct constrains how other constructs behave
# governs: []
# governed_by: []

# Dependencies on other construct packs (optional — Level 2)
# Uncomment when your construct depends on another
# pack_dependencies:
#   - slug: observer
#     version: ">=1.0.0"

# Identity files for persona and expertise.
#
# The construct-invocation glossary (Tier 4 persona-handle resolution) looks
# up personas via `identity/<HANDLE>.md` filenames — UPPERCASE_HANDLE.md per
# convention. Examples across the ecosystem:
#
#   artisan/identity/ALEXANDER.md
#   k-hole/identity/STAMETS.md
#   observer/identity/KEEPER.md
#
# If your construct ships a persona, author `identity/<HANDLE>.md` so the
# operator can invoke via `@HANDLE` or mention the persona by name. The
# starter identity/ARCHITECT.md file in this template shows the shape.
identity:
  persona: identity/persona.yaml
  expertise: identity/expertise.yaml
  handles:
    - ARCHITECT

# Post-install hook (optional)
hooks:
  post_install: scripts/install.sh

# Quick start command shown after installation
quick_start:
  command: /quick-review
  description: "Run a fast review of your latest changes — surfaces the top issues by blast radius"
